apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "catwiki.fullname" . }}-client
  labels:
    {{- include "catwiki.labels" . | nindent 4 }}
    app.kubernetes.io/component: client
spec:
  replicas: {{ .Values.client.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: client
      {{- include "catwiki.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: client
        {{- include "catwiki.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: client
          image: {{ include "catwiki.image" (dict "global" .Values.global "image" .Values.client.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8002
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: TZ
              value: {{ .Values.global.timezone }}
            {{- range $key, $val := .Values.client.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            {{- toYaml .Values.client.resources | nindent 12 }}
