{{- if .Values.rustfs.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "catwiki.fullname" . }}-rustfs
  labels:
    {{- include "catwiki.labels" . | nindent 4 }}
    app.kubernetes.io/component: rustfs
spec:
  type: ClusterIP
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
  selector:
    app.kubernetes.io/component: rustfs
    {{- include "catwiki.selectorLabels" . | nindent 4 }}
---
{{- if .Values.rustfs.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "catwiki.fullname" . }}-rustfs-data
  labels:
    {{- include "catwiki.labels" . | nindent 4 }}
    app.kubernetes.io/component: rustfs
  annotations:
    "helm.sh/resource-policy": keep
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.rustfs.persistence.storageClass }}
  storageClassName: {{ .Values.rustfs.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.rustfs.persistence.dataSize }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "catwiki.fullname" . }}-rustfs-logs
  labels:
    {{- include "catwiki.labels" . | nindent 4 }}
    app.kubernetes.io/component: rustfs
  annotations:
    "helm.sh/resource-policy": keep
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.rustfs.persistence.storageClass }}
  storageClassName: {{ .Values.rustfs.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.rustfs.persistence.logsSize }}
{{- end }}
{{- end }}
