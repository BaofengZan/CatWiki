apiVersion: v1
kind: Service
metadata:
  name: {{ include "catwiki.fullname" . }}-client
  labels:
    {{- include "catwiki.labels" . | nindent 4 }}
    app.kubernetes.io/component: client
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.client.service.port }}
      targetPort: 8002
      protocol: TCP
  selector:
    app.kubernetes.io/component: client
    {{- include "catwiki.selectorLabels" . | nindent 4 }}
