{{- if .Values.rustfs.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "catwiki.fullname" . }}-rustfs
  labels:
    {{- include "catwiki.labels" . | nindent 4 }}
    app.kubernetes.io/component: rustfs
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: rustfs
      {{- include "catwiki.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: rustfs
        {{- include "catwiki.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: rustfs
          image: {{ include "catwiki.image" (dict "global" .Values.global "image" .Values.rustfs.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 9000
              protocol: TCP
          env:
            - name: TZ
              value: {{ .Values.global.timezone }}
            - name: RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "catwiki.fullname" . }}-secret
                  key: RUSTFS_ACCESS_KEY
            - name: RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "catwiki.fullname" . }}-secret
                  key: RUSTFS_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: rustfs-data
              mountPath: /data
            - name: rustfs-logs
              mountPath: /logs
          resources:
            {{- toYaml .Values.rustfs.resources | nindent 12 }}
      volumes:
        - name: rustfs-data
          {{- if .Values.rustfs.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "catwiki.fullname" . }}-rustfs-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: rustfs-logs
          {{- if .Values.rustfs.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "catwiki.fullname" . }}-rustfs-logs
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
