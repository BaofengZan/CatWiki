apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "catwiki.fullname" . }}-config
  labels:
    {{- include "catwiki.labels" . | nindent 4 }}
data:
  # 基础配置
  ENVIRONMENT: {{ .Values.backend.environment | quote }}
  TZ: {{ .Values.global.timezone | quote }}
  DEBUG: "false"
  LOG_LEVEL: "INFO"

  # PostgreSQL 连接
  POSTGRES_SERVER: {{ include "catwiki.fullname" . }}-postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  POSTGRES_USER: {{ .Values.postgres.user | quote }}

  # 数据库连接池
  DB_POOL_SIZE: {{ .Values.backend.dbPoolSize | quote }}
  DB_MAX_OVERFLOW: {{ .Values.backend.dbMaxOverflow | quote }}
  DB_POOL_TIMEOUT: {{ .Values.backend.dbPoolTimeout | quote }}
  DB_POOL_RECYCLE: {{ .Values.backend.dbPoolRecycle | quote }}
  DB_ECHO: "false"

  # Redis
  REDIS_HOST: {{ include "catwiki.fullname" . }}-redis
  REDIS_PORT: "6379"

  # RustFS
  RUSTFS_ENDPOINT: {{ include "catwiki.fullname" . }}-rustfs:9000
  RUSTFS_PUBLIC_URL: {{ .Values.rustfs.publicUrl | quote }}
  RUSTFS_PUBLIC_BUCKET: {{ .Values.rustfs.publicBucket | quote }}

  # CORS
  BACKEND_CORS_ORIGINS: {{ .Values.backend.corsOrigins | quote }}
