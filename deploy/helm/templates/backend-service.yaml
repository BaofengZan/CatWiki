apiVersion: v1
kind: Service
metadata:
  name: {{ include "catwiki.fullname" . }}-backend
  labels:
    {{- include "catwiki.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: 3000
      protocol: TCP
  selector:
    app.kubernetes.io/component: backend
    {{- include "catwiki.selectorLabels" . | nindent 4 }}
